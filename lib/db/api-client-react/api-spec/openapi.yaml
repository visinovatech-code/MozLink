openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: MozLink API - Portal de Oportunidades de Moçambique
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: opportunities
    description: Job, scholarship and public tender opportunities
  - name: categories
    description: Opportunity categories
  - name: stats
    description: Portal statistics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /opportunities:
    get:
      operationId: listOpportunities
      tags: [opportunities]
      summary: List all opportunities
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [emprego, concurso_publico, bolsa_estudo]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 12
        - name: search
          in: query
          schema:
            type: string
        - name: featured
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of opportunities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpportunitiesResponse"
    post:
      operationId: createOpportunity
      tags: [opportunities]
      summary: Create a new opportunity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOpportunityBody"
      responses:
        "201":
          description: Created opportunity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Opportunity"

  /opportunities/recent:
    get:
      operationId: getRecentOpportunities
      tags: [opportunities]
      summary: Get most recent opportunities (for homepage)
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 6
      responses:
        "200":
          description: Recent opportunities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Opportunity"

  /opportunities/featured:
    get:
      operationId: getFeaturedOpportunities
      tags: [opportunities]
      summary: Get featured/highlighted opportunities
      responses:
        "200":
          description: Featured opportunities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Opportunity"

  /opportunities/{id}:
    get:
      operationId: getOpportunity
      tags: [opportunities]
      summary: Get opportunity by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Opportunity detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Opportunity"
        "404":
          description: Not found

  /opportunities/{id}/whatsapp:
    post:
      operationId: sendToWhatsapp
      tags: [opportunities]
      summary: Send opportunity notification to WhatsApp channel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: WhatsApp notification sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsAppResult"

  /scraper/run:
    post:
      operationId: runScraper
      tags: [opportunities]
      summary: Manually trigger the opportunity scraper
      responses:
        "200":
          description: Scraping result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScraperResult"

  /scraper/status:
    get:
      operationId: getScraperStatus
      tags: [opportunities]
      summary: Get scraper last run status
      responses:
        "200":
          description: Scraper status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScraperStatus"

  /stats/summary:
    get:
      operationId: getStatsSummary
      tags: [stats]
      summary: Get portal statistics summary
      responses:
        "200":
          description: Stats summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsSummary"

  /stats/by-category:
    get:
      operationId: getStatsByCategory
      tags: [stats]
      summary: Get opportunity counts per category
      responses:
        "200":
          description: Counts by category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryCount"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Opportunity:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        category:
          type: string
          enum: [emprego, concurso_publico, bolsa_estudo]
        institution:
          type: string
        location:
          type: string
        requirements:
          type: string
        deadline:
          type: string
        howToApply:
          type: string
        sourceUrl:
          type: string
        content:
          type: string
        slug:
          type: string
        featured:
          type: boolean
        published:
          type: boolean
        whatsappSent:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - title
        - category
        - institution
        - location
        - requirements
        - deadline
        - howToApply
        - content
        - slug
        - featured
        - published
        - whatsappSent
        - createdAt
        - updatedAt

    CreateOpportunityBody:
      type: object
      properties:
        title:
          type: string
        category:
          type: string
          enum: [emprego, concurso_publico, bolsa_estudo]
        institution:
          type: string
        location:
          type: string
        requirements:
          type: string
        deadline:
          type: string
        howToApply:
          type: string
        sourceUrl:
          type: string
        content:
          type: string
        featured:
          type: boolean
      required:
        - title
        - category
        - institution
        - location
        - requirements
        - deadline
        - howToApply
        - content

    OpportunitiesResponse:
      type: object
      properties:
        opportunities:
          type: array
          items:
            $ref: "#/components/schemas/Opportunity"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer
      required:
        - opportunities
        - total
        - page
        - totalPages

    WhatsAppResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        channelUrl:
          type: string
      required:
        - success
        - message

    ScraperResult:
      type: object
      properties:
        success:
          type: boolean
        newOpportunities:
          type: integer
        sources:
          type: array
          items:
            type: string
        message:
          type: string
      required:
        - success
        - newOpportunities
        - sources
        - message

    ScraperStatus:
      type: object
      properties:
        lastRun:
          type: string
        nextRun:
          type: string
        status:
          type: string
        totalScraped:
          type: integer
      required:
        - status
        - totalScraped

    StatsSummary:
      type: object
      properties:
        totalOpportunities:
          type: integer
        totalEmpregos:
          type: integer
        totalConcursos:
          type: integer
        totalBolsas:
          type: integer
        publishedToday:
          type: integer
        expiringThisWeek:
          type: integer
        whatsappSubscribers:
          type: integer
      required:
        - totalOpportunities
        - totalEmpregos
        - totalConcursos
        - totalBolsas
        - publishedToday
        - expiringThisWeek
        - whatsappSubscribers

    CategoryCount:
      type: object
      properties:
        category:
          type: string
        count:
          type: integer
        label:
          type: string
      required:
        - category
        - count
        - label
